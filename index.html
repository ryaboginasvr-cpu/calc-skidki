<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор скидки</title>
  <style>
    :root {
      --primary: #2563eb;
      --primary-hover: #1d4ed8;
      --slate-50: #f8fafc;
      --slate-100: #f1f5f9;
      --slate-200: #e2e8f0;
      --slate-300: #cbd5e1;
      --slate-400: #94a3b8;
      --slate-500: #64748b;
      --slate-600: #475569;
      --slate-700: #334155;
      --slate-800: #1e293b;
      --slate-900: #0f172a;
      --red-50: #fef2f2;
      --red-100: #fee2e2;
      --red-500: #ef4444;
      --red-600: #dc2626;
      --red-700: #b91c1c;
      --red-800: #991b1b;
      --emerald-50: #ecfdf5;
      --emerald-100: #d1fae5;
      --emerald-600: #059669;
      --emerald-700: #047857;
      --emerald-800: #065f46;
      --indigo-50: #eef2ff;
      --indigo-100: #e0e7ff;
      --indigo-600: #4f46e5;
      --indigo-700: #4338ca;
      --amber-400: #fbbf24;
    }

    * { box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: var(--slate-50);
      color: var(--slate-800);
    }

    .calc-container {
      max-width: 480px;
      margin: 20px auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      border: 1px solid var(--slate-100);
      overflow: hidden;
    }

    .calc-header {
      background: var(--primary);
      padding: 24px;
      text-align: center;
      color: white;
    }

    .calc-header h2 { margin: 0; font-size: 20px; font-weight: 700; color: white !important;}
    .calc-header p { margin: 4px 0 0; font-size: 14px; color: #dbeafe; }

    .calc-body { padding: 24px; }

    .form-group { margin-bottom: 20px; }
    
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--slate-700);
      margin-bottom: 6px;
    }

    .badge {
      font-size: 10px;
      font-weight: 400;
      padding: 2px 6px;
      background: var(--slate-100);
      color: var(--slate-500);
      border-radius: 9999px;
    }

    .input-wrapper { position: relative; }

    .input-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--slate-400);
    }

    .input-suffix {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--slate-400);
      font-weight: 500;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 36px 10px 36px;
      font-size: 16px;
      border: 1px solid var(--slate-200);
      border-radius: 12px;
      background: var(--slate-50);
      color: var(--slate-900);
      outline: none;
      transition: all 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
    }

    input[type="text"].indigo-input {
      background: var(--indigo-50);
      border-color: var(--indigo-100);
      color: var(--indigo-700);
    }
    
    input[type="text"].indigo-input:focus {
      border-color: var(--indigo-600);
      box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.2);
    }

    .divider {
      height: 1px;
      background: var(--slate-100);
      margin: 20px 0;
    }

    .rate-buttons {
      display: flex;
      gap: 6px;
    }

    .rate-btn {
      flex: 1;
      padding: 8px 0;
      background: var(--slate-100);
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: var(--slate-600) !important;
      cursor: pointer;
      transition: all 0.2s;
    }

    .rate-btn.active {
      background: var(--primary);
      color: white !important;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }

    .preset-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 8px;
    }

    .preset-tag {
      font-size: 10px;
      padding: 4px 8px;
      background: var(--slate-100);
      border: none;
      border-radius: 6px;
      color: var(--slate-600) !important;
      cursor: pointer;
      transition: background 0.2s;
      font-weight: 500;
    }

    .preset-tag:hover { background: var(--slate-200); }

    .actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn-clear {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 12px;
      background: var(--slate-100);
      color: var(--slate-500) !important;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .btn-clear:hover { background: var(--slate-200); }

    .btn-calc {
      flex: 1;
      border: none;
      border-radius: 12px;
      background: var(--primary);
      color: white !important;
      font-weight: 600;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
      box-shadow: 0 4px 6px -1px rgba(37, 99, 235, 0.2);
    }

    .btn-calc:hover { background: var(--primary-hover); }

    .error-message {
      color: var(--red-500);
      background: var(--red-50);
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      text-align: center;
      display: none;
      margin-top: 16px;
    }

    .results {
      margin-top: 24px;
      padding-top: 24px;
      border-top: 1px solid var(--slate-100);
      display: none;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .alert {
      padding: 16px;
      border-radius: 12px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }

    .alert-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      margin-top: 2px;
    }

    .alert-red { background: var(--red-50); border: 1px solid var(--red-200); }
    .alert-red .alert-icon { color: var(--red-600); }
    .alert-red h4 { color: var(--red-800); margin: 0 0 4px; font-size: 14px; font-weight: 700; }
    .alert-red p { color: var(--red-600); margin: 0; font-size: 12px; }
    
    .alert-emerald { background: var(--emerald-50); border: 1px solid var(--emerald-200); }
    .alert-emerald .alert-icon { color: var(--emerald-600); }
    .alert-emerald h4 { color: var(--emerald-800); margin: 0 0 4px; font-size: 14px; font-weight: 700; }
    .alert-emerald p { color: var(--emerald-700); margin: 0; font-size: 12px; line-height: 1.4; }

    .alert-indigo { background: var(--indigo-50); border: 1px solid var(--indigo-100); }
    .alert-indigo .alert-icon { color: var(--indigo-600); }
    .alert-indigo h4 { color: var(--indigo-700); margin: 0 0 4px; font-size: 14px; font-weight: 700; }
    .alert-indigo p { color: var(--indigo-600); margin: 0; font-size: 12px; line-height: 1.4; }

    .salary-block {
      background: var(--slate-800);
      border-radius: 12px;
      padding: 20px;
      position: relative;
      overflow: hidden;
    }

    .salary-block h4 {
      color: var(--slate-300);
      margin: 0 0 16px;
      font-size: 14px;
      font-weight: 600;
    }

    .salary-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--slate-700);
      margin-bottom: 12px;
    }

    .salary-row:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }

    .salary-label { font-size: 14px; color: var(--slate-400); }
    .salary-val-emerald { font-size: 18px; font-weight: 700; color: var(--emerald-500); }
    .salary-val-amber { font-size: 18px; font-weight: 700; color: var(--amber-400); }
    
    .salary-loss {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 8px;
      padding: 6px 8px;
      background: rgba(153, 27, 27, 0.3);
      border-radius: 8px;
      color: var(--red-400);
    }

    .loss-label { font-size: 12px; font-weight: 500; display: flex; align-items: center; gap: 4px; }
    .loss-val { font-size: 14px; font-weight: 700; }

    .inner-salary-block {
      background: rgba(255,255,255,0.6);
      border: 1px solid var(--emerald-100);
      border-radius: 8px;
      padding: 12px;
      margin-top: 12px;
    }
    
    .inner-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    .inner-row:last-child { margin-bottom: 0; }
    
    .inner-label { font-size: 12px; color: var(--slate-600); font-weight: 500; }
    .inner-val { font-size: 14px; font-weight: 700; color: var(--emerald-700); }
    
    .inner-loss-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 6px;
      padding-top: 6px;
      border-top: 1px solid var(--emerald-50);
      color: var(--red-500);
    }
    .inner-loss-label { font-size: 10px; display: flex; align-items: center; gap: 4px;}
    .inner-loss-val { font-size: 10px; font-weight: 700; }

    .info-footer {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--red-100);
    }

    svg { display: block; }
  </style>
</head>
<body>

<div class="calc-container" id="discount-calc">
  <div class="calc-header">
    <svg style="margin: 0 auto 12px; width: 32px; height: 32px;" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"></rect><line x1="8" y1="6" x2="16" y2="6"></line><line x1="16" y1="14" x2="16" y2="14.01"></line><line x1="16" y1="18" x2="16" y2="18.01"></line><line x1="12" y1="14" x2="12" y2="14.01"></line><line x1="12" y1="18" x2="12" y2="18.01"></line><line x1="8" y1="14" x2="8" y2="14.01"></line><line x1="8" y1="18" x2="8" y2="18.01"></line></svg>
    <h2>Калькулятор скидки</h2>
    <p>расчет предельной скидки и вашей премии</p>
  </div>

  <div class="calc-body">
    <form id="calc-form">
      
      <div class="grid-2 form-group">
        <div>
          <label>ставка ндс</label>
          <div class="rate-buttons" id="vat-rates">
            <button type="button" class="rate-btn" data-rate="5">5%</button>
            <button type="button" class="rate-btn" data-rate="7">7%</button>
            <button type="button" class="rate-btn" data-rate="10">10%</button>
            <button type="button" class="rate-btn active" data-rate="22">22%</button>
          </div>
        </div>
        <div>
          <label>цена с ндс</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 2v20l2-1 2 1 2-1 2 1 2-1 2 1 2-1 2 1V2l-2 1-2-1-2 1-2-1-2 1-2-1-2 1Z"></path><path d="M16 8h-6a2 2 0 1 0 0 4h4a2 2 0 1 1 0 4H8"></path><path d="M12 17.5v-11"></path></svg>
            </span>
            <input type="text" id="inp-price-vat" inputmode="decimal" placeholder="например: 18 300">
            <span class="input-suffix">₽</span>
          </div>
        </div>
      </div>

      <div class="grid-2 form-group">
        <div>
          <label>
            желаемая (с ндс)
            <span class="badge">опция</span>
          </label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
            </span>
            <input type="text" id="inp-target-vat" class="indigo-input" inputmode="decimal" placeholder="с ндс">
          </div>
        </div>
        <div>
          <label>желаемая (без ндс)</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>
            </span>
            <input type="text" id="inp-target-base" class="indigo-input" inputmode="decimal" placeholder="без ндс">
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="form-group">
        <label>базовая цена (без ндс)</label>
        <div class="input-wrapper">
          <span class="input-icon">
             <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
          </span>
          <input type="text" id="inp-base" inputmode="decimal" placeholder="например: 15 000">
          <span class="input-suffix">₽</span>
        </div>
      </div>

      <div class="form-group">
        <label>себестоимость товара или услуги</label>
        <div class="input-wrapper">
          <span class="input-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
          </span>
          <input type="text" id="inp-cost" inputmode="decimal" placeholder="например: 10 000">
          <span class="input-suffix">₽</span>
        </div>
      </div>

      <div class="grid-2 form-group" style="margin-bottom:0;">
        <div>
          <label>мин. маржа</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"></line><circle cx="6.5" cy="6.5" r="2.5"></circle><circle cx="17.5" cy="17.5" r="2.5"></circle></svg>
            </span>
            <input type="text" id="inp-margin" inputmode="decimal" placeholder="20">
          </div>
          <div class="preset-tags" id="preset-margins">
            <button type="button" class="preset-tag" data-val="10">10%</button>
            <button type="button" class="preset-tag" data-val="15">15%</button>
            <button type="button" class="preset-tag" data-val="20">20%</button>
            <button type="button" class="preset-tag" data-val="30">30%</button>
          </div>
        </div>
        <div>
          <label>% вашей премии</label>
          <div class="input-wrapper">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"></path><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"></path><path d="M18 12a2 2 0 0 0-2 2c0 1.1.9 2 2 2h4v-4h-4z"></path></svg>
            </span>
            <input type="text" id="inp-comm" inputmode="decimal" placeholder="10">
          </div>
          <div class="preset-tags" id="preset-comms">
            <button type="button" class="preset-tag" data-val="5">5%</button>
            <button type="button" class="preset-tag" data-val="10">10%</button>
            <button type="button" class="preset-tag" data-val="15">15%</button>
          </div>
        </div>
      </div>

      <div class="error-message" id="error-box"></div>

      <div class="actions">
        <button type="button" class="btn-clear" id="btn-clear" title="очистить форму">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"></polyline><polyline points="23 20 23 14 17 14"></polyline><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"></path></svg>
        </button>
        <button type="submit" class="btn-calc">Рассчитать</button>
      </div>
    </form>

    <div class="results" id="results-box">
      <!-- сюда js подставит нужный блок с результатами -->
    </div>

  </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
  
  // элементы DOM
  const form = document.getElementById('calc-form');
  const errorBox = document.getElementById('error-box');
  const resultsBox = document.getElementById('results-box');
  const btnClear = document.getElementById('btn-clear');
  
  const inPriceVat = document.getElementById('inp-price-vat');
  const inBase = document.getElementById('inp-base');
  const inTargetVat = document.getElementById('inp-target-vat');
  const inTargetBase = document.getElementById('inp-target-base');
  const inCost = document.getElementById('inp-cost');
  const inMargin = document.getElementById('inp-margin');
  const inComm = document.getElementById('inp-comm');
  
  const vatRateBtns = document.querySelectorAll('.rate-btn');
  const presetMargins = document.querySelectorAll('#preset-margins .preset-tag');
  const presetComms = document.querySelectorAll('#preset-comms .preset-tag');

  let currentVatRate = 22;

  // утилиты форматирования
  function formatNumberSpaces(value) {
    if (!value) return '';
    let clean = value.toString().replace(/[^0-9.,]/g, '');
    clean = clean.replace('.', ',');
    const parts = clean.split(',');
    parts[0] = parts[0].replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    if (parts.length > 1) return `${parts[0]},${parts[1].slice(0, 2)}`;
    return parts[0];
  }

  function parseToNumber(val) {
    if (!val) return NaN;
    return parseFloat(val.toString().replace(/\s/g, '').replace(',', '.'));
  }

  function formatCalculated(num) {
    if (isNaN(num)) return '';
    const rounded = Math.round(num * 100) / 100;
    return formatNumberSpaces(rounded.toString());
  }

  function formatCurrency(num) {
    return new Intl.NumberFormat('ru-RU', { 
      style: 'currency', 
      currency: 'RUB',
      minimumFractionDigits: 0,
      maximumFractionDigits: 2
    }).format(num);
  }

  // обработчики ввода с форматированием на лету
  const inputsToFormat = [inPriceVat, inBase, inTargetVat, inTargetBase, inCost, inMargin, inComm];
  inputsToFormat.forEach(input => {
    input.addEventListener('input', function(e) {
      const pos = this.selectionStart;
      const oldLength = this.value.length;
      this.value = formatNumberSpaces(this.value);
      // попытка сохранить позицию курсора
      const newPos = Math.max(0, pos + (this.value.length - oldLength));
      this.setSelectionRange(newPos, newPos);
    });
  });

  // связка полей цены и НДС
  inPriceVat.addEventListener('input', function() {
    const num = parseToNumber(this.value);
    inBase.value = !isNaN(num) ? formatCalculated(num / (1 + currentVatRate / 100)) : '';
  });

  inBase.addEventListener('input', function() {
    const num = parseToNumber(this.value);
    inPriceVat.value = !isNaN(num) ? formatCalculated(num * (1 + currentVatRate / 100)) : '';
  });

  inTargetVat.addEventListener('input', function() {
    const num = parseToNumber(this.value);
    inTargetBase.value = !isNaN(num) ? formatCalculated(num / (1 + currentVatRate / 100)) : '';
  });

  inTargetBase.addEventListener('input', function() {
    const num = parseToNumber(this.value);
    inTargetVat.value = !isNaN(num) ? formatCalculated(num * (1 + currentVatRate / 100)) : '';
  });

  // переключение НДС
  vatRateBtns.forEach(btn => {
    btn.addEventListener('click', function() {
      vatRateBtns.forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      currentVatRate = parseFloat(this.dataset.rate);
      
      // пересчет зависимых полей
      const bpNum = parseToNumber(inBase.value);
      if (!isNaN(bpNum)) inPriceVat.value = formatCalculated(bpNum * (1 + currentVatRate / 100));
      
      const tbpNum = parseToNumber(inTargetBase.value);
      if (!isNaN(tbpNum)) inTargetVat.value = formatCalculated(tbpNum * (1 + currentVatRate / 100));
    });
  });

  // пресеты маржи и комиссии
  presetMargins.forEach(btn => {
    btn.addEventListener('click', function() {
      inMargin.value = this.dataset.val;
      hideError();
    });
  });

  presetComms.forEach(btn => {
    btn.addEventListener('click', function() {
      inComm.value = this.dataset.val;
    });
  });

  // очистка
  btnClear.addEventListener('click', function() {
    form.reset();
    [inPriceVat, inBase, inTargetVat, inTargetBase, inCost, inMargin, inComm].forEach(inp => inp.value = '');
    currentVatRate = 22;
    vatRateBtns.forEach(b => {
      b.classList.remove('active');
      if(b.dataset.rate === '22') b.classList.add('active');
    });
    hideError();
    resultsBox.style.display = 'none';
    resultsBox.innerHTML = '';
  });

  function showError(msg) {
    errorBox.textContent = msg;
    errorBox.style.display = 'block';
    resultsBox.style.display = 'none';
  }

  function hideError() {
    errorBox.style.display = 'none';
  }

  // главный расчет
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    hideError();

    const bp = parseToNumber(inBase.value);
    const cp = parseToNumber(inCost.value);
    const m = parseToNumber(inMargin.value);
    const comm = parseToNumber(inComm.value) || 0;
    const targetBaseNum = parseToNumber(inTargetBase.value);
    const targetVatNum = parseToNumber(inTargetVat.value);

    // проверки
    if (isNaN(bp) || isNaN(cp) || isNaN(m)) {
      showError('пожалуйста, заполните основные поля корректными числами.');
      return;
    }
    if (bp <= 0 || cp <= 0) {
      showError('цена и себестоимость должны быть больше нуля.');
      return;
    }
    if (m < 0 || m >= 100) {
      showError('маржа должна быть от 0 до 99 процентов.');
      return;
    }

    const minPrice = cp / (1 - (m / 100));
    const maxDiscountValue = bp - minPrice;
    const maxDiscountPercent = (maxDiscountValue / bp) * 100;
    const isMarginBreached = bp < minPrice;

    const baseProfit = bp - cp;
    const minProfit = minPrice - cp;
    const baseSalary = baseProfit > 0 ? baseProfit * (comm / 100) : 0;
    const minSalary = minProfit > 0 ? minProfit * (comm / 100) : 0;
    const salaryLoss = baseSalary - minSalary;

    let targetAnalysis = null;

    if (!isNaN(targetBaseNum) && targetBaseNum > 0) {
      const targetProfit = targetBaseNum - cp;
      const targetMarginCalc = targetProfit > 0 ? (targetProfit / targetBaseNum) * 100 : 0;
      const targetSalary = targetProfit > 0 ? targetProfit * (comm / 100) : 0;
      
      targetAnalysis = {
        priceWithVat: targetVatNum || (targetBaseNum * (1 + currentVatRate / 100)),
        basePrice: targetBaseNum,
        margin: targetMarginCalc,
        marginValue: targetProfit,
        salary: targetSalary,
        salaryLoss: baseSalary - targetSalary,
        isApproved: targetBaseNum >= minPrice,
        discountPercent: bp > 0 ? ((bp - targetBaseNum) / bp) * 100 : 0,
        discountValue: bp > 0 ? (bp - targetBaseNum) : 0
      };
    }

    renderResults({
      minPrice,
      minProfit: isMarginBreached ? 0 : minProfit,
      maxDiscountValue: isMarginBreached ? 0 : maxDiscountValue,
      maxDiscountPercent: isMarginBreached ? 0 : maxDiscountPercent,
      isMarginBreached,
      baseSalary: isMarginBreached ? 0 : baseSalary,
      minSalary: isMarginBreached ? 0 : minSalary,
      salaryLoss: isMarginBreached ? 0 : salaryLoss,
      hasCommission: comm > 0,
      targetAnalysis
    });
  });

  function renderResults(res) {
    let html = '';

    const iconAlert = `<svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>`;
    const iconCheck = `<svg class="alert-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>`;
    const iconArrowDown = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="7" x2="17" y2="17"></line><polyline points="17 7 17 17 7 17"></polyline></svg>`;

    if (res.isMarginBreached) {
      html += `
        <div class="alert alert-red">
          ${iconAlert}
          <div>
            <h4>внимание: скидка невозможна</h4>
            <p>базовая цена уже ниже порога минимальной маржи. сделка убыточна.</p>
          </div>
        </div>
      `;
    } else {
      
      if (res.targetAnalysis) {
        if (res.targetAnalysis.isApproved) {
          html += `
            <div class="alert alert-emerald">
              ${iconCheck}
              <div style="width:100%">
                <h4>желаемая цена одобрена</h4>
                <p style="margin-bottom:12px;">скидка составит ${res.targetAnalysis.discountPercent.toFixed(1)}% (${formatCurrency(res.targetAnalysis.discountValue)}). итоговая маржа сделки: ${res.targetAnalysis.margin.toFixed(1)}% (${formatCurrency(res.targetAnalysis.marginValue)}).</p>
                
                ${res.hasCommission ? `
                  <div class="inner-salary-block">
                    <div class="inner-row">
                      <span class="inner-label">ваша премия без скидки:</span>
                      <span class="inner-label" style="font-weight:700;">${formatCurrency(res.baseSalary)}</span>
                    </div>
                    <div class="inner-row">
                      <span class="inner-label" style="color:var(--slate-800)">ваша премия со скидкой:</span>
                      <span class="inner-val">${formatCurrency(res.targetAnalysis.salary)}</span>
                    </div>
                    ${res.targetAnalysis.salaryLoss > 0 ? `
                      <div class="inner-loss-row">
                        <span class="inner-loss-label">${iconArrowDown} потеря из-за скидки:</span>
                        <span class="inner-loss-val">${formatCurrency(res.targetAnalysis.salaryLoss)}</span>
                      </div>
                    ` : ''}
                  </div>
                ` : ''}
              </div>
            </div>
          `;
        } else {
          html += `
            <div class="alert alert-red">
              ${iconAlert}
              <div style="width:100%">
                <h4>желаемая цена не проходит</h4>
                <p>клиент просит слишком много. при такой цене маржа падает до ${res.targetAnalysis.margin.toFixed(1)}% (${formatCurrency(res.targetAnalysis.marginValue)}), что ниже допустимых ${inMargin.value}%.</p>
                <div class="info-footer">
                  <p style="font-size:12px; font-weight:500; color:var(--red-800); margin:0 0 4px;">максимум, что вы можете дать:</p>
                  <p style="font-size:14px; font-weight:700; color:var(--red-700); margin:0;">скидка ${res.maxDiscountPercent.toFixed(1)}% (${formatCurrency(res.maxDiscountValue)}) (до цены ${formatCurrency(res.minPrice * (1 + currentVatRate/100))} с ндс)</p>
                </div>
              </div>
            </div>
          `;
        }
      } else {
        html += `
          <div class="alert alert-indigo">
            ${iconCheck}
            <div>
              <h4>лимит скидки рассчитан</h4>
              <p>вы можете уступить клиенту до <strong>${res.maxDiscountPercent.toFixed(1)}%</strong> (${formatCurrency(res.maxDiscountValue)} от базы), опустив базовую цену до ${formatCurrency(res.minPrice)}. маржа сделки составит ${inMargin.value}% (${formatCurrency(res.minProfit)}).</p>
            </div>
          </div>
        `;
      }

      if (res.hasCommission && !res.targetAnalysis) {
        html += `
          <div class="salary-block">
            <h4>ваша личная премия</h4>
            
            <div class="salary-row">
              <span class="salary-label">без скидки клиенту</span>
              <span class="salary-val-emerald">${formatCurrency(res.baseSalary)}</span>
            </div>
            
            <div class="salary-row">
              <span class="salary-label">при макс. скидке</span>
              <span class="salary-val-amber">${formatCurrency(res.minSalary)}</span>
            </div>

            ${res.salaryLoss > 0 ? `
              <div class="salary-loss">
                <span class="loss-label">${iconArrowDown} максимальная потеря</span>
                <span class="loss-val">${formatCurrency(res.salaryLoss)}</span>
              </div>
            ` : ''}
          </div>
        `;
      }
    }

    resultsBox.innerHTML = html;
    resultsBox.style.display = 'block';
  }

});
</script>

</body>
</html>
